<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Devinettes · Riddles · Indovinelli</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,400..700&family=Manrope:wght@400..700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:           #E6F0F8;
      --bg-deep:      #D4E5F2;
      --bg-card:      #F6FAFD;
      --ink:          #0A2540;
      --ink-soft:     #36506E;
      --ink-muted:    #7990A8;
      --accent:       #1F4E8C;
      --accent-deep:  #14365E;
      --accent-light: #4A78AE;
      --accent-pale:  #C9DCEE;
      --border:       #B7CDE2;
      --radius:       14px;
    }

    * { box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(ellipse at 18% 12%, rgba(255,255,255,0.7) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 92%, rgba(74,120,174,0.10) 0%, transparent 60%),
        var(--bg);
      color: var(--ink);
      font-family: 'Manrope', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 20px 60px;
    }

    /* ─── Language bar ─────────────────────────────────────── */
    .lang-bar {
      display: flex;
      gap: 4px;
      padding: 5px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 999px;
      box-shadow: 0 1px 2px rgba(10,37,64,0.04);
    }

    .lang-btn {
      padding: 8px 16px;
      border: none;
      background: transparent;
      border-radius: 999px;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.6px;
      color: var(--ink-soft);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
    }

    .lang-btn .flag {
      width: 20px;
      height: 14px;
      border-radius: 2px;
      display: inline-block;
      object-fit: cover;
      border: 1px solid rgba(10,37,64,0.12);
      box-shadow: 0 1px 1px rgba(10,37,64,0.08);
    }

    .lang-btn:hover:not(.active) {
      background: var(--accent-pale);
      color: var(--ink);
    }

    .lang-btn.active {
      background: var(--accent);
      color: #fff;
    }

    .lang-btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* ─── Counter ──────────────────────────────────────────── */
    .counter {
      margin-top: 18px;
      font-family: 'Fraunces', serif;
      font-feature-settings: "tnum";
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--ink-muted);
    }

    /* ─── Main stage ───────────────────────────────────────── */
    .stage {
      flex: 1;
      width: 100%;
      max-width: 720px;
      margin-top: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 320px;
      position: relative;
      padding: 20px 0;
    }

    .quote-mark {
      position: absolute;
      top: -50px;
      left: 0;
      font-family: 'Fraunces', serif;
      font-size: clamp(140px, 22vw, 200px);
      line-height: 1;
      color: var(--accent-pale);
      pointer-events: none;
      user-select: none;
      font-weight: 300;
      font-style: italic;
      z-index: 0;
      opacity: 0.8;
    }

    .prompt {
      font-family: 'Fraunces', serif;
      font-optical-sizing: auto;
      font-weight: 400;
      font-size: clamp(22px, 4.5vw, 34px);
      line-height: 1.35;
      text-align: center;
      color: var(--ink);
      max-width: 100%;
      position: relative;
      z-index: 1;
      margin: 0;
      padding: 0 8px;
    }

    .prompt.changing {
      animation: fadeIn 0.45s ease;
    }

    .answer-wrap {
      margin-top: 28px;
      width: 100%;
      max-width: 540px;
      display: flex;
      justify-content: center;
      min-height: 0;
    }

    .answer {
      padding: 16px 26px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius);
      text-align: center;
      animation: slideDown 0.3s ease;
      box-shadow: 0 2px 6px rgba(10,37,64,0.04);
    }

    .answer-label {
      display: block;
      font-family: 'Manrope', sans-serif;
      font-size: 10px;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-bottom: 6px;
      font-weight: 600;
    }

    .answer-text {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(18px, 3.5vw, 22px);
      color: var(--ink);
    }

    /* ─── Action buttons ───────────────────────────────────── */
    .actions {
      margin-top: 36px;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      padding: 13px 28px;
      border: none;
      border-radius: 999px;
      font-family: 'Manrope', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease, border-color 0.2s ease, opacity 0.2s ease;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 6px rgba(31, 78, 140, 0.18);
    }
    .btn-primary:hover {
      background: var(--accent-deep);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(31, 78, 140, 0.28);
    }
    .btn-primary:active { transform: translateY(0); }

    .btn-secondary {
      background: transparent;
      color: var(--accent);
      border: 1.5px solid var(--accent-light);
    }
    .btn-secondary:hover:not(:disabled) {
      background: var(--accent-pale);
      border-color: var(--accent);
    }
    .btn-secondary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }

    /* ─── Footer hint ──────────────────────────────────────── */
    .hint {
      margin-top: 26px;
      font-size: 11px;
      letter-spacing: 0.5px;
      color: var(--ink-muted);
      text-align: center;
    }
    .hint kbd {
      font-family: 'Manrope', sans-serif;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--ink-soft);
      margin: 0 2px;
    }

    /* ─── Animations ───────────────────────────────────────── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── Mobile ───────────────────────────────────────────── */
    @media (max-width: 480px) {
      body { padding: 20px 16px 40px; }
      .lang-btn { padding: 7px 12px; font-size: 12px; gap: 6px; }
      .quote-mark { top: -30px; }
      .stage { margin-top: 24px; min-height: 260px; }
      .actions { margin-top: 28px; }
      .btn { padding: 12px 22px; font-size: 13px; }
      .hint { display: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

t walk?","answer":"A table"},{"id":39,"prompt":"What has one head, one foot and four legs?","answer":"A bed"},{"id":40,"prompt":"What can you catch, but not throw?","answer":"A cold"},{"id":41,"prompt":"What kind of band never plays music?","answer":"A rubber band"},{"id":42,"prompt":"What has many teeth, but can't bite?","answer":"A comb"},{"id":43,"prompt":"What is cut on a table, but is never eaten?","answer":"A deck of cards"},{"id":44,"prompt":"What has words, but never speaks?","answer":"A book"},{"id":45,"prompt":"What runs all around a backyard, yet never moves?","answer":"A fence"},{"id":46,"prompt":"What can travel all around the world without leaving its corner?","answer":"A stamp"},{"id":47,"prompt":"What has a thumb and four fingers, but is not a hand?","answer":"A glove"},{"id":48,"prompt":"What has a head and a tail but no body?","answer":"A coin"},{"id":49,"prompt":"What building has the most stories?","answer":"The library"},{"id":50,"prompt":"What tastes better than it smells?","answer":"Your tongue"},{"id":51,"prompt":"What has 13 hearts, but no other organs?","answer":"A deck of cards"},{"id":52,"prompt":"What kind of coat is best put on wet?","answer":"A coat of paint"},{"id":53,"prompt":"What has four wheels and flies?","answer":"A garbage truck"},{"id":54,"prompt":"I am an odd number. Take away a letter and I become even. What number am I?","answer":"Seven"},{"id":55,"prompt":"If two's company, and three's a crowd, what are four and five?","answer":"Nine"},{"id":56,"prompt":"What three numbers, none of which is zero, give the same result whether they're added or multiplied?","answer":"One, two and three"},{"id":57,"prompt":"Mary has four daughters, and each of her daughters has a brother. How many children does Mary have?","answer":"Five—each daughter has the same brother"},{"id":58,"prompt":"Which is heavier: a ton of bricks or a ton of feathers?","answer":"Neither—they both weigh a ton"},{"id":59,"prompt":"Two fathers and two sons are in a c rd"},{"id":94,"prompt":"What kind of room has no walls or corners?","answer":"A mushroom"},{"id":95,"prompt":"What starts with T, ends with T, and has T inside it?","answer":"A teapot"},{"id":96,"prompt":"I have no wings, but I can fly. And I have no eyes, but I can cry. What am I?","answer":"A cloud"},{"id":97,"prompt":"What can jump higher than a building?","answer":"Anything that can jump—buildings don't jump"},{"id":98,"prompt":"Imagine you are in a room with no windows or doors. How will you get out?","answer":"Stop imagining"},{"id":99,"prompt":"Where would you take a sick boat?","answer":"To the dock"},{"id":100,"prompt":"I'm orange, I wear a green hat and I sound like a parrot. What am I?","answer":"A carrot"}],"fr":[{"id":1,"prompt":"J'ai quatre pattes et un dos, mais je ne peux pas marcher. Qui suis-je ?","answer":"Une chaise"},{"id":2,"prompt":"Je suis ronde, je deviens toute rouge au soleil, ma peau est parfaitement lisse et j'adore me glisser dans les salades en été. Qui suis-je ?","answer":"La tomate"},{"id":3,"prompt":"Je porte des lunettes, mais je ne vois pas. Qui suis-je ?","answer":"Le nez"},{"id":4,"prompt":"J'ai des dents, mais je ne mords pas. Je n'ai pas de bouche. Je n'ai pas de tête, pourtant j'ai souvent des cheveux. Qui suis-je ?","answer":"Un peigne"},{"id":5,"prompt":"Le père de Tim a trois enfants : Kendra, Léo et… ?","answer":"Tim"},{"id":6,"prompt":"J'ai 5 doigts, mais je ne suis pas vivant. Qui suis-je ?","answer":"Un gant"},{"id":7,"prompt":"Je n'ai qu'un pied et je ne porte pas de chaussure. J'ai un chapeau, mais pas de tête. Qui suis-je ?","answer":"Un champignon"},{"id":8,"prompt":"Je suis toujours avec toi et je copie tes mouvements. Mais tu ne peux jamais m'attraper ni me toucher. Qui suis-je ?","answer":"Ton ombre"},{"id":9,"prompt":"Quel mois de l'année a 28 jours ?","answer":"Tous les mois"},{"id":10,"prompt":"On me trouve dans le ciel, dans la mer et sur les sapins de Noël. Qui suis-je ?","answer":"Une étoile"},{"id":11,"pr     let currentLang = 'en';
    const shownIds = { en: new Set(), fr: new Set(), it: new Set() };
    let currentRiddle = null;

    const promptEl    = document.getElementById('prompt');
    const answerWrap  = document.getElementById('answerWrap');
    const counterEl   = document.getElementById('counter');
    const showBtn     = document.getElementById('showBtn');
    const nextBtn     = document.getElementById('nextBtn');
    const hintEl      = document.querySelector('.hint');
    const langButtons = document.querySelectorAll('.lang-btn');

    /* Localized UI strings */
    const LABELS = {
      en: { show: 'Show answer', hide: 'Hide answer', next: 'Next →',     answer: 'Answer',   hint: '<kbd>Space</kbd> reveals answer · <kbd>→</kbd> next' },
      fr: { show: 'Voir la réponse', hide: 'Cacher la réponse', next: 'Suivant →', answer: 'Réponse',  hint: '<kbd>Espace</kbd> révèle la réponse · <kbd>→</kbd> suivant' },
      it: { show: 'Mostra risposta', hide: 'Nascondi risposta', next: 'Avanti →', answer: 'Risposta', hint: '<kbd>Spazio</kbd> rivela la risposta · <kbd>→</kbd> avanti' },
    };

    let answerVisible = false;

    function pickNext() {
      const all  = RIDDLES[currentLang];
      const seen = shownIds[currentLang];
      if (seen.size >= all.length) seen.clear();          // cycle reset
      const remaining = all.filter(r => !seen.has(r.id));
      const next = remaining[Math.floor(Math.random() * remaining.length)];
      seen.add(next.id);
      currentRiddle = next;
      render();
    }

    function render() {
      // Restart fade animation on prompt
      promptEl.classList.remove('changing');
      void promptEl.offsetWidth;                          // reflow
      promptEl.classList.add('changing');
      promptEl.textContent = currentRiddle.prompt;

      // New riddle → answer always hidden
      setAnswerVisible(false);

      // Counter
      counterEl.textContent = `${shownIds[currentLang].size} / ${RIDDLES[currentLang].length}`;
    }

    function setAnswerVisible(visible) {
      answerVisible = visible;
      if (visible && currentRiddle) {
        answerWrap.innerHTML = '';
        const div = document.createElement('div');
        div.className = 'answer';
        div.innerHTML = `
          <span class="answer-label"></span>
          <span class="answer-text"></span>
        `;
        div.querySelector('.answer-label').textContent = LABELS[currentLang].answer;
        div.querySelector('.answer-text').textContent  = currentRiddle.answer;
        answerWrap.appendChild(div);
      } else {
        answerWrap.innerHTML = '';
      }
      applyLabels();
    }

    function toggleAnswer() {
      if (!currentRiddle) return;
      setAnswerVisible(!answerVisible);
    }

    function applyLabels() {
      const L = LABELS[currentLang];
      showBtn.textContent = answerVisible ? L.hide : L.show;
      nextBtn.textContent = L.next;
      hintEl.innerHTML = L.hint;
    }

    function setLang(lang) {
      if (lang === currentLang && currentRiddle) return;
      currentLang = lang;
      langButtons.forEach(b => {
        const active = b.dataset.lang === lang;
        b.classList.toggle('active', active);
        b.setAttribute('aria-selected', active ? 'true' : 'false');
      });
      pickNext();
    }

    /* Events */
    langButtons.forEach(btn =>
      btn.addEventListener('click', () => setLang(btn.dataset.lang))
    );
    showBtn.addEventListener('click', toggleAnswer);
    nextBtn.addEventListener('click', pickNext);

    /* Keyboard */
    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.key === 'ArrowRight' || e.key === 'n' || e.key === 'N') {
        pickNext();
        e.preventDefault();
      } else if (e.key === ' ' || e.key === 'Enter') {
        toggleAnswer();
        e.preventDefault();
      }
    });

    /* Init */
    setLang('en');
  </script>
